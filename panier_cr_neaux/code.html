<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f2f2d9",
              "tertiary-fixed": "#ffdbc9",
              "background": "#fbfbe2",

              "secondary": "#735c00",
              "primary-fixed": "#ffdad3",
              "on-tertiary": "#ffffff",
              "surface": "#fbfbe2",
              "on-secondary-fixed-variant": "#574500",
              "on-tertiary-fixed-variant": "#753401",
              "on-surface-variant": "#56423e",
              "surface-container-low": "#f5f5dc",
              "on-primary": "#ffffff",
              "secondary-fixed": "#ffe088",
              "on-background": "#1b1d0e",

              "outline-variant": "#ddc0ba",

              "surface-container-highest": "#e4e4cc",

              "on-primary-fixed-variant": "#802918",
              "inverse-surface": "#303221",

              "secondary-container": "#fed65b",
              "surface-dim": "#dbdcc3",
              "on-surface": "#1b1d0e",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",

              "primary-container": "#e2725b",

            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #fbfbe2;
      }
      .serif-voice {
        font-family: 'Noto Serif', serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        height: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #ddc0ba;
        border-radius: 10px;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#FBFBE2]/80 dark:bg-stone-900/80 backdrop-blur-lg docked full-width top-0 sticky z-50 shadow-sm dark:shadow-none flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#9F402D] dark:text-[#E2725B]" data-icon="location_on">location_on</span>
<h1 class="font-['Noto_Serif'] text-xl font-bold text-[#9F402D] dark:text-[#E2725B]">L'Escale Terracotta</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#9F402D] dark:text-[#E2725B]" data-icon="shopping_bag">shopping_bag</span>
</button>
</header>
<main class="max-w-2xl mx-auto px-6 pt-8 space-y-10">
<!-- Header Section -->
<section>
<h2 class="serif-voice text-4xl font-bold tracking-tight text-primary">Votre Panier</h2>
<p class="text-on-surface-variant font-medium mt-2">Révision de votre sélection gastronomique</p>
</section>
<!-- Cart Items - Bento Style Layout -->
<section class="space-y-6">
<div class="grid grid-cols-1 gap-6">
<!-- Item 1: Risotto -->
<div class="bg-surface-container-lowest rounded-xl p-6 flex items-center gap-6 group transition-all duration-300 hover:shadow-lg">
<div class="relative w-24 h-24 flex-shrink-0 overflow-hidden rounded-lg">
<img class="w-full h-full object-cover" data-alt="Gourmet creamy saffron risotto with roasted asparagus and parmesan shavings on a textured ceramic plate" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYWH-NImdg8uNfQv7Kraagcw6fo_dspCPnHPnzbrSDqrwlAw2plx4O3SewS4UjnuNVSSqN9EOi1lfXMxcoV_NKKN19fluC6bVms6bAjf8opjkfnYochahZsD6UIP5dNHww8KHP4ebKz9mXbg7dbB3fJl_XDbajBUEXFRMw0RggU_IhmjWhMNirrVEQog75clj8RUOgfuJPuZXdtxqCNy_daU08rr77ptYq_PbETGuea8ngiAL7ntl5zk6qcvRVzv5fjdFMGwfc9nGt"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<div>
<h3 class="serif-voice text-xl font-bold text-on-surface">Risotto aux Asperges</h3>
<p class="text-xs font-bold uppercase tracking-widest text-secondary mt-1">PLAT PRINCIPAL</p>
</div>
<span class="font-bold text-lg text-primary">24.00€</span>
</div>
<div class="flex items-center justify-between mt-4">
<div class="flex items-center bg-surface-container-low rounded-full px-3 py-1 gap-4">
<button class="text-primary hover:opacity-70"><span class="material-symbols-outlined text-sm">remove</span></button>
<span class="font-bold text-sm w-4 text-center">1</span>
<button class="text-primary hover:opacity-70"><span class="material-symbols-outlined text-sm">add</span></button>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
</div>
</div>
<!-- Item 2: Fondant -->
<div class="bg-surface-container-lowest rounded-xl p-6 flex items-center gap-6 group transition-all duration-300 hover:shadow-lg">
<div class="relative w-24 h-24 flex-shrink-0 overflow-hidden rounded-lg">
<img class="w-full h-full object-cover" data-alt="Decadent chocolate fondant with a molten center, served with a scoop of vanilla bean gelato and gold leaf" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZ3wAyqAMTk_e1q64U1HxQSZcxUJkQdOJ5yTIbdfXX-JCAaeF7GRDeTkrNq0GkpRrOZKFkpS1nhDw87kcRSh6tuVgFc8FLbDZ4vT0pA8txnsQO2oFrFQ-poVyYz2kA8LFrV2qZ4LGUbr4mNR6P4Wo2FZA9sbAb_XVdvZ23KDxAcYj6PXIEL0oVg7kdGoCbjPkWWxGUxgAs_AHiTzENwAXoYzLIyy7LLuMJlLAvElMCstGHLBdRFH6kMYbABAoxdojumbfKfzuOW4oe"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<div>
<h3 class="serif-voice text-xl font-bold text-on-surface">Fondant au Chocolat</h3>
<p class="text-xs font-bold uppercase tracking-widest text-secondary mt-1">DESSERT SIGNATURE</p>
</div>
<span class="font-bold text-lg text-primary">12.00€</span>
</div>
<div class="flex items-center justify-between mt-4">
<div class="flex items-center bg-surface-container-low rounded-full px-3 py-1 gap-4">
<button class="text-primary hover:opacity-70"><span class="material-symbols-outlined text-sm">remove</span></button>
<span class="font-bold text-sm w-4 text-center">1</span>
<button class="text-primary hover:opacity-70"><span class="material-symbols-outlined text-sm">add</span></button>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
</div>
</div>
</div>
</section>
<!-- Time Slot Selector -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="serif-voice text-2xl font-bold text-on-surface">Heure d'arrivée</h3>
<span class="text-secondary font-bold text-sm bg-secondary-container/30 px-3 py-1 rounded-full">Aujourd'hui</span>
</div>
<div class="flex gap-3 overflow-x-auto pb-4 custom-scrollbar">
<!-- Slot 12:00 -->
<button class="flex-shrink-0 px-6 py-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-primary-container transition-all text-center group">
<span class="block text-lg font-extrabold text-on-surface">12:00</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant group-hover:text-primary transition-colors">Disponible</span>
</button>
<!-- Slot 12:15 Active -->
<button class="flex-shrink-0 px-6 py-4 rounded-xl bg-primary text-white border-2 border-primary shadow-lg text-center">
<span class="block text-lg font-extrabold">12:15</span>
<span class="text-[10px] font-bold uppercase tracking-tighter opacity-80">Sélectionné</span>
</button>
<!-- Slot 12:30 -->
<button class="flex-shrink-0 px-6 py-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-primary-container transition-all text-center group">
<span class="block text-lg font-extrabold text-on-surface">12:30</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant group-hover:text-primary transition-colors">Disponible</span>
</button>
<!-- Slot 12:45 -->
<button class="flex-shrink-0 px-6 py-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-primary-container transition-all text-center group">
<span class="block text-lg font-extrabold text-on-surface">12:45</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant group-hover:text-primary transition-colors">Disponible</span>
</button>
<!-- Slot 13:00 -->
<button class="flex-shrink-0 px-6 py-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-primary-container transition-all text-center group">
<span class="block text-lg font-extrabold text-on-surface">13:00</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant group-hover:text-primary transition-colors">Disponible</span>
</button>
</div>
</section>
<!-- Summary & CTA -->
<section class="bg-surface-container-low rounded-[2rem] p-8 space-y-6">
<div class="space-y-3">
<div class="flex justify-between items-center text-on-surface-variant">
<span class="font-medium">Sous-total</span>
<span class="font-bold">36.00€</span>
</div>
<div class="flex justify-between items-center text-on-surface-variant">
<span class="font-medium">Frais de service</span>
<span class="font-bold">2.50€</span>
</div>
<div class="h-px bg-outline-variant/20 my-4"></div>
<div class="flex justify-between items-center text-on-surface">
<span class="serif-voice text-2xl font-bold">Total</span>
<span class="text-3xl font-extrabold text-primary">38.50€</span>
</div>
</div>
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white py-5 rounded-full font-bold text-lg shadow-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                Continuer vers les coordonnées
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#FBFBE2]/80 dark:bg-stone-900/80 backdrop-blur-lg z-50 rounded-t-[2rem] shadow-[0_-4px_20px_rgba(0,0,0,0.05)] border-t border-stone-200/20">
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-5 py-2 hover:text-[#735C00] transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.05em] font-bold mt-1">Menu</span>
</button>
<!-- Active: Cart -->
<button class="flex flex-col items-center justify-center bg-[#E2725B] dark:bg-[#9F402D] text-white rounded-full px-5 py-2 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="shopping_cart" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.05em] font-bold mt-1">Cart</span>
</button>
<button class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-5 py-2 hover:text-[#735C00] transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.05em] font-bold mt-1">My Orders</span>
</button>
</nav>
</body></html>
